<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eule · controls</title>
  <link rel="stylesheet" href="src/style.css">
  <style>
    :root {
      --fg: #1a1a1a; --muted: #666; --line: #dcdcdc;
      --bg: #f6f6f4; --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg); background: var(--bg); min-height: 100vh;
    }
    .topbar {
      padding: 14px 20px; border-bottom: 1px solid var(--line);
      background: #fff; display: flex; align-items: center; gap: 10px;
    }
    .topbar h1 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      min-height: calc(100vh - 50px);
    }
    .stage-wrap {
      display: flex; align-items: center; justify-content: center; padding: 28px;
    }
    .stage-bg {
      width: 100%; height: 100%; min-height: 460px;
      /* Flex so CSS transform on stage animates from center */
      display: flex; align-items: center; justify-content: center;
      border-radius: 12px; border: 1px solid var(--line);
      background-color: #fff;
      background-image:
        linear-gradient(45deg,#e0e0e0 25%,transparent 25%),
        linear-gradient(-45deg,#e0e0e0 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#e0e0e0 75%),
        linear-gradient(-45deg,transparent 75%,#e0e0e0 75%);
      background-size: 22px 22px;
      background-position: 0 0,0 11px,11px -11px,-11px 0;
    }
    .controls {
      border-left: 1px solid var(--line); padding: 14px 18px;
      background: #fff; overflow-y: auto; max-height: calc(100vh - 50px);
    }
    fieldset {
      border: 1px solid var(--line); border-radius: 9px;
      padding: 9px 11px 11px; margin: 0 0 10px;
    }
    legend {
      padding: 0 5px; font-size: 11px; text-transform: uppercase;
      letter-spacing: .08em; color: var(--muted);
    }
    .row { display: flex; flex-wrap: wrap; gap: 5px; }
    .col { display: flex; flex-direction: column; gap: 7px; }
    button {
      font: inherit; padding: 5px 11px; border-radius: 7px;
      border: 1px solid var(--line); background: #fafafa;
      cursor: pointer; color: var(--fg); transition: background 90ms;
    }
    button:hover { background: #f0f0ed; border-color: #c5c5c5; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { filter: brightness(1.1); }
    button.danger { color: #b91c1c; border-color: #fca5a5; }
    button.danger:hover { background: #fee2e2; }
    input[type="range"] { width: 100%; }
    output { font-size: 12px; color: var(--muted); }
    label { display: inline-flex; gap: 6px; align-items: center; font-size: 13px; }
    .check-group { display: flex; flex-direction: column; gap: 4px; }
    .dial-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
    .dial { width: 56px; height: 56px; flex: 0 0 56px; }
    .dial svg { display: block; }
    .dial-row label {
      flex: 1; flex-direction: column; gap: 2px; font-size: 11px;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em;
    }
    .status { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .status.live { color: #16a34a; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>eule · controls</h1>
    <button class="primary" id="btn-open-fullscreen">Vollbild öffnen ↗</button>
  </header>

  <main class="layout">
    <section class="stage-wrap">
      <div class="stage-bg">
        <div id="mount"></div>
      </div>
    </section>

    <aside class="controls">

      <fieldset>
        <legend>zyklus</legend>
        <div class="col">
          <div class="row">
            <button class="primary" id="btn-cycle">▶ starten</button>
            <button class="danger" id="btn-stop">◼ stopp</button>
          </div>
          <div id="fullscreen-status" class="status">Vollbild: nicht verbunden</div>

          <div class="check-group" id="idle-checks">
            <label><input type="checkbox" value="nod"      checked> nod</label>
            <label><input type="checkbox" value="headTilt" checked> headTilt</label>
            <label><input type="checkbox" value="shake"    checked> shake</label>
            <label><input type="checkbox" value="hop"      checked> hop</label>
            <label><input type="checkbox" value="blink"> blink</label>
          </div>

          <label>
            interval
            <input type="range" id="interval" min="500" max="4000" step="100" value="1500">
            <output id="interval-out">1.5 s</output>
          </label>

          <label>
            idle-dauer
            <input type="range" id="duration" min="3000" max="30000" step="1000" value="8000">
            <output id="duration-out">8 s</output>
          </label>

          <div class="dial-row">
            <div class="dial">
              <svg viewBox="-50 -50 100 100">
                <circle r="44" fill="none" stroke="#dcdcdc" stroke-width="2"/>
                <circle r="3" fill="#888"/>
                <line id="dial-in-needle" x1="0" y1="0" x2="40" y2="0"
                      stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>
            <label>
              flyin-winkel
              <input type="range" id="fly-in-angle" min="0" max="359" value="135">
              <output id="fly-in-angle-out">135°</output>
            </label>
          </div>
          <div class="dial-row">
            <div class="dial">
              <svg viewBox="-50 -50 100 100">
                <circle r="44" fill="none" stroke="#dcdcdc" stroke-width="2"/>
                <circle r="3" fill="#888"/>
                <line id="dial-out-needle" x1="0" y1="0" x2="40" y2="0"
                      stroke="#e55" stroke-width="3" stroke-linecap="round"/>
              </svg>
            </div>
            <label>
              flyout-winkel
              <input type="range" id="fly-out-angle" min="0" max="359" value="45">
              <output id="fly-out-angle-out">45°</output>
            </label>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>einzeln</legend>
        <div class="row" id="anim-btns"></div>
      </fieldset>

      <fieldset>
        <legend>größe</legend>
        <label>
          <input type="range" id="size" min="100" max="600" step="10" value="360">
          <output id="size-out">360px</output>
        </label>
      </fieldset>

      <fieldset>
        <legend>debug</legend>
        <label><input type="checkbox" id="debug"> layer outlines</label>
      </fieldset>

    </aside>
  </main>

  <script type="module">
    import { Eule, ANIMATION_NAMES } from './src/eule.js';

    // Local preview
    const eule = new Eule(document.getElementById('mount'), { size: 360 });
    window.eule = eule;
    await eule.ready;

    // BroadcastChannel to control fullscreen tab
    const ch = new BroadcastChannel('eule');

    // Track whether fullscreen tab is open
    const statusEl = document.getElementById('fullscreen-status');
    ch.onmessage = ({ data }) => {
      if (data.type === 'ping') {
        statusEl.textContent = 'Vollbild: verbunden ●';
        statusEl.className = 'status live';
      }
    };

    function send(msg) {
      ch.postMessage(msg);
    }

    // Open fullscreen tab and start sending pings so it can report back
    document.getElementById('btn-open-fullscreen').addEventListener('click', () => {
      window.open('index.html', 'eule-fullscreen');
    });

    // Angle dials
    const inAngleInput  = document.getElementById('fly-in-angle');
    const inAngleOut    = document.getElementById('fly-in-angle-out');
    const inNeedle      = document.getElementById('dial-in-needle');
    const outAngleInput = document.getElementById('fly-out-angle');
    const outAngleOut   = document.getElementById('fly-out-angle-out');
    const outNeedle     = document.getElementById('dial-out-needle');

    const updateAngles = () => {
      const ai = +inAngleInput.value, ao = +outAngleInput.value;
      inAngleOut.value  = `${ai}°`;
      outAngleOut.value = `${ao}°`;
      inNeedle.setAttribute('transform',  `rotate(${-ai})`);
      outNeedle.setAttribute('transform', `rotate(${-ao})`);
    };
    inAngleInput.addEventListener('input',  updateAngles);
    outAngleInput.addEventListener('input', updateAngles);
    updateAngles();

    const intervalInput = document.getElementById('interval');
    const intervalOut   = document.getElementById('interval-out');
    intervalInput.addEventListener('input', () => {
      intervalOut.value = (+intervalInput.value / 1000).toFixed(1) + ' s';
    });

    const durationInput = document.getElementById('duration');
    const durationOut   = document.getElementById('duration-out');
    durationInput.addEventListener('input', () => {
      durationOut.value = (+durationInput.value / 1000).toFixed(0) + ' s';
    });

    const getOpts = () => ({
      idleAnims:   [...document.querySelectorAll('#idle-checks input:checked')].map(el => el.value),
      interval:    +intervalInput.value,
      duration:    +durationInput.value,
      flyInAngle:  +inAngleInput.value,
      flyOutAngle: +outAngleInput.value,
    });

    document.getElementById('btn-cycle').addEventListener('click', () => {
      const opts = getOpts();
      eule.cycle(opts);
      send({ type: 'cycle', opts });
    });

    document.getElementById('btn-stop').addEventListener('click', () => {
      eule.stop();
      send({ type: 'stop' });
    });

    // Individual animation buttons
    for (const name of ANIMATION_NAMES) {
      const btn = document.createElement('button');
      btn.textContent = name;
      btn.addEventListener('click', () => {
        const opts = name === 'landIn'  ? { angle: +inAngleInput.value }
                   : name === 'flyOut' ? { angle: +outAngleInput.value }
                   : {};
        eule.play(name, opts);
        send({ type: 'play', name, opts });
      });
      document.getElementById('anim-btns').appendChild(btn);
    }

    const sizeInput = document.getElementById('size');
    const sizeOut   = document.getElementById('size-out');
    sizeInput.addEventListener('input', () => {
      const px = +sizeInput.value;
      sizeOut.value = `${px}px`;
      eule.setSize(px);
    });

    document.getElementById('debug').addEventListener('change', e =>
      eule.setDebug(e.target.checked)
    );
  </script>
</body>
</html>
