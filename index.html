<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eule · studio</title>
  <link rel="stylesheet" href="src/style.css">
  <link rel="stylesheet" href="studio.css">
</head>
<body data-bg="checker">
  <header class="topbar">
    <h1>eule · studio</h1>
    <div class="muted">layered owl with a programmatic animation API</div>
  </header>

  <main class="layout">
    <section class="stage-wrap">
      <div id="stage-bg" class="stage-bg">
        <div id="owl-mount"></div>
      </div>
    </section>

    <aside class="controls">
      <fieldset>
        <legend>size</legend>
        <input id="size" type="range" min="100" max="1000" value="480" step="10">
        <output id="size-out">480px</output>
      </fieldset>

      <fieldset>
        <legend>background</legend>
        <div class="row">
          <button data-bg="checker" class="active">checker</button>
          <button data-bg="white">white</button>
          <button data-bg="black">black</button>
          <button data-bg="photo">photo</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>debug</legend>
        <label><input type="checkbox" id="debug"> show layer outlines</label>
      </fieldset>

      <fieldset>
        <legend>loops</legend>
        <div class="row">
          <button data-loop="idle">idle</button>
          <button data-loop="sleep">sleep</button>
          <button data-loop="stop">stop</button>
        </div>
      </fieldset>

      <fieldset>
        <legend>head</legend>
        <div class="row" id="anim-head"></div>
      </fieldset>

      <fieldset>
        <legend>charakter</legend>
        <div class="row" id="anim-char"></div>
      </fieldset>

      <fieldset>
        <legend>aktion</legend>
        <div class="row" id="anim-action"></div>
      </fieldset>

      <fieldset>
        <legend>akzente</legend>
        <div class="row" id="anim-accent"></div>
      </fieldset>

      <fieldset>
        <legend>ketten</legend>
        <div class="row">
          <button data-chain="alert,headTilt,blink,blink">alert → tilt → blink²</button>
          <button data-chain="hop,wingFlutter,nod">hop → flutter → nod</button>
          <button data-chain="landIn,headTurn,flyOut">landIn → look → flyOut</button>
        </div>
      </fieldset>
    </aside>
  </main>

  <script type="module" src="studio.js"></script>
</body>
</html>
