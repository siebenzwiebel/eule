<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eule</title>
  <link rel="stylesheet" href="src/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
    }
    #mount { position: fixed; inset: 0; }
    /* Hard-center stage in the viewport via fixed positioning so CSS
       transform on the stage (used by all animations) is free. */
    #mount > .eule-stage {
      position: fixed;
      left: 50%;
      top: 50%;
      margin-left: calc(var(--eule-size) / -2);
      margin-top:  calc(var(--eule-size) / -2);
    }
    /* White owl on dark background */
    .eule-svg { filter: invert(1); }
  </style>
</head>
<body>
  <div id="mount"></div>
  <script type="module">
    import { Eule } from './src/eule.js';

    // 65% of the shorter viewport edge — large but not riesig
    const eule = new Eule(document.getElementById('mount'), {
      size: Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.65),
    });
    window.eule = eule;
    await eule.ready;

    // Listen for commands from controls.html
    const ch = new BroadcastChannel('eule');
    ch.onmessage = ({ data }) => {
      if (data.type === 'cycle') eule.cycle(data.opts);
      else if (data.type === 'play')  eule.play(data.name, data.opts ?? {});
      else if (data.type === 'stop')  eule.stop();
      // Reply so controls.html shows "verbunden"
      ch.postMessage({ type: 'ping' });
    };

    // Auto-start
    eule.cycle();
  </script>
</body>
</html>
