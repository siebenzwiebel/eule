<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>eule</title>
  <link rel="stylesheet" href="src/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #mount {
      width: 100vmin;
      height: 100vmin;
    }
  </style>
</head>
<body>
  <div id="mount"></div>
  <script type="module">
    import { Eule } from './src/eule.js';

    const eule = new Eule(document.getElementById('mount'), { size: Math.min(window.innerWidth, window.innerHeight) });
    window.eule = eule;

    await eule.ready;
    eule.cycle();
  </script>
</body>
</html>
